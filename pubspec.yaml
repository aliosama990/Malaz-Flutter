name: malaz_app
description: "تطبيق متابعة الأطفال"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  intl: ^0.18.0
  google_maps_flutter: ^2.5.0

  provider: ^6.1.1
  shared_preferences: ^2.2.2
  http: ^1.1.0
  smooth_page_indicator: ^1.1.0
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - lib\assets\images\logo.jpeg
    - lib\assets\images\onboarding1.jpeg
    - lib\assets\images\finalmboarding2.jpeg
    - lib\assets\images\onboarding3.jpeg
    - lib\assets\images\malaz_logo.png
    - lib\assets\images\google_logo.png
